<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF to Audio Converter</title>
    
    <link rel="stylesheet" href="audio.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
   
    <div class="container">
        <header>
            <h1>📄 PDF to Audio Converter</h1>
            <p>Upload any PDF and listen to it instantly</p>
        </header>

        <section class="upload-section" id="uploadSection">
            <div class="upload-area" id="dropArea">
                <i class="fas fa-cloud-upload-alt upload-icon"></i>
                <h3>Drag & Drop PDF Here</h3>
                <p>or</p>
                <button class="btn" id="fileButton">Browse Files</button>
                <input type="file" id="fileInput" accept=".pdf" hidden>
            </div>
        </section>

        <section class="processing-section" id="processingSection" style="display: none;">
            <div class="progress-container">
                <div class="progress-bar" id="progressBar"></div>
            </div>
            <p id="progressText">Extracting text from PDF...</p>
        </section>

        <section class="audio-section" id="audioSection" style="display: none;"> 
            <div class="text-preview">
                <h3>Extracted Text Preview</h3>
                <div class="text-preview-content" id="textPreview">Your text will appear here...</div>
            </div>
    
            <div class="audio-controls">
                
                <div id="timeDisplay" style="text-align: right; font-family: 'Courier New', Courier, monospace; font-weight: bold; font-size: 14px; color: #667eea; margin-bottom: 5px;">
                    0:00 / 0:00
                </div>
                <audio id="audioPlayer" controls style="width: 100%; margin-bottom: 20px;"></audio>

                <div class="voice-selection" style="margin-bottom: 15px;">
                    <label for="voiceSelect" style="display: block; font-size: 13px; color: #666; margin-bottom: 5px; font-weight: 600;">🗣️ Select Voice:</label>
                    <select id="voiceSelect" class="voice-dropdown"></select>
                </div>

                <div class="control-row" style="margin-bottom: 15px; display: flex; align-items: center; gap: 10px;">
                    <i class="fas fa-volume-up" style="color: #667eea; width: 20px;"></i>
                    <input type="range" id="volumeSlider" min="0" max="1" step="0.1" value="1" style="flex: 1;">
                    <span id="volumeValue" style="font-size: 12px; min-width: 35px; color: #666;">100%</span>
                </div>

                <div class="control-row" style="margin-bottom: 25px; display: flex; align-items: center; gap: 10px;">
                    <i class="fas fa-running" style="color: #667eea; width: 20px;"></i>
                    <input type="range" id="speedSlider" min="0.5" max="2" step="0.1" value="1" style="flex: 1;">
                    <span id="speedValue" style="font-size: 12px; min-width: 35px; color: #666;">1.0x</span>
                </div>

                <div class="button-group">
                    <button class="btn" id="backBtn" title="Back 10 seconds">
                        <i class="fas fa-backward"></i> -10s
                    </button>

                    <button class="btn" id="playBtn">▶️ Play</button>

                    <button class="btn" id="forwardBtn" title="Forward 10 seconds">
                        10s + <i class="fas fa-forward"></i>
                    </button>

                    <button class="btn secondary" id="downloadBtn">💾 Download</button>
                    <button class="btn secondary" id="newFileBtn">📁 New File</button>
                </div>
            </div>
        </section>
    </div>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script src="audio.js"></script>
</body>
</html>
